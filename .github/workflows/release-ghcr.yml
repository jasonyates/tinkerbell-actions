name: Release (GHCR)
on:
  push:
    branches:
      - main
      - feat/rootio-sw-raid
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  CONTAINER_REPOSITORY: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # Add more actions to this list as you maintain forks of them.
        action: [rootio]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Release
        run: make prepare-release

      - name: Run Release
        run: make release-${{ matrix.action }} -j $(nproc)
