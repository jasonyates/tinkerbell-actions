name: Release (GHCR)
on:
  push:
    branches:
      - main
      - feat/rootio-sw-raid
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # Add more actions to this list as you maintain forks of them.
        action: [rootio]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.action }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.action }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.action }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.action }}
          cache-to: type=gha,scope=${{ matrix.action }},mode=max
