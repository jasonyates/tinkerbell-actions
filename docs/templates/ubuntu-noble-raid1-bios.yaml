apiVersion: tinkerbell.org/v1alpha1
kind: Template
metadata:
  name: ubuntu-noble-raid1-bios
  namespace: tink-system
  labels:
    os: ubuntu
    pretty-name: ubuntu-noble-raid1-bios
spec:
  data: |
    version: "0.1"
    name: ubuntu-noble-raid1-bios
    global_timeout: 432000
    tasks:
      - name: "os-installation"
        worker: "{{ .device_1 }}"
        volumes:
          - /dev:/dev
          - /dev/console:/dev/console
          - /lib/firmware:/lib/firmware:ro
          - /sys:/sys
        actions:
          # 1. Wipe + partition + assemble /dev/md0 RAID1
          - name: "rootio-partition"
            image: ghcr.io/jasonyates/tinkerbell-actions/rootio:latest
            timeout: 180
            command: ["partition"]
            environment:
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 2. mkfs.ext4 on /dev/md0 (label ROOT)
          - name: "rootio-format"
            image: ghcr.io/jasonyates/tinkerbell-actions/rootio:latest
            timeout: 120
            command: ["format"]
            environment:
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 3. Extract Noble rootfs tarball onto /dev/md0
          #
          # Checksum verification is skipped because archive2disk hashes the
          # bytes consumed by its tar reader, which stops at the end-of-archive
          # marker — always fewer bytes than `sha256sum file.tar.gz` or
          # `gunzip -c | sha256sum`, so there is no way to pre-compute a value
          # it will accept without replicating its reader. Pre-flight the hash
          # out-of-band (e.g. the .tar.gz.sha256 file alongside the tarball).
          - name: "extract-rootfs"
            image: ghcr.io/jasonyates/tinkerbell-actions/archive2disk:latest
            timeout: 900
            environment:
              ARCHIVE_URL: "http://31.24.228.5:7173/noble-rootfs-bios.tar.gz"
              ARCHIVE_TYPE: "targz"
              DEST_DISK: "/dev/md0"
              FS_TYPE: "ext4"
              DEST_PATH: "/"
              INSECURE_NO_TARFILE_CHECKSUM_VERIFICATION: "true"

          # 4. Chroot once, do everything: mdadm config, fstab, initramfs,
          # install GRUB to both RAID members, generate grub.cfg.
          #
          # We don't use grub2disk because its chroot layout bind-mounts its own
          # (alpine) /bin, /usr, /lib over the target (Ubuntu, usrmerged), which
          # breaks /bin/sh resolution. cexec mounts only the target rootfs and
          # binds /proc /sys /dev, which is what we actually want.
          - name: "chroot-finalize"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 900
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "mkdir -p /etc/mdadm; mdadm --detail --scan > /etc/mdadm/mdadm.conf; printf 'LABEL=ROOT / ext4 defaults 0 1\n' > /etc/fstab; update-initramfs -u -k all; grub-install --target=i386-pc /dev/sda; grub-install --target=i386-pc /dev/sdb; update-grub"
