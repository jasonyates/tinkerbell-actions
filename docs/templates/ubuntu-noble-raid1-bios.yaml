apiVersion: tinkerbell.org/v1alpha1
kind: Template
metadata:
  name: ubuntu-noble-raid1-bios
  namespace: tink-system
  labels:
    os: ubuntu
    pretty-name: ubuntu-noble-raid1-bios
spec:
  data: |
    version: "0.1"
    name: ubuntu-noble-raid1-bios
    global_timeout: 432000
    tasks:
      - name: "os-installation"
        worker: "{{ .device_1 }}"
        volumes:
          - /dev:/dev
          - /dev/console:/dev/console
          - /lib/firmware:/lib/firmware:ro
          - /sys:/sys
        actions:
          # 1. Partition (BIOS boot + ROOT on each disk), assemble /dev/md0.
          - name: "rootio-partition"
            image: ghcr.io/jasonyates/tinkerbell-actions/rootio:latest
            timeout: 180
            command: ["partition"]
            environment:
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 2. mkfs.ext4 on /dev/md0 (label ROOT).
          - name: "rootio-format"
            image: ghcr.io/jasonyates/tinkerbell-actions/rootio:latest
            timeout: 120
            command: ["format"]
            environment:
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 3. Extract Noble rootfs tarball onto /dev/md0.
          - name: "extract-rootfs"
            image: ghcr.io/jasonyates/tinkerbell-actions/archive2disk:latest
            timeout: 900
            environment:
              ARCHIVE_URL: "http://31.24.228.5:7173/noble-rootfs-bios.tar.gz"
              ARCHIVE_TYPE: "targz"
              DEST_DISK: "/dev/md0"
              FS_TYPE: "ext4"
              DEST_PATH: "/"
              INSECURE_NO_TARFILE_CHECKSUM_VERIFICATION: "true"

          # 4. Default netplan: DHCP all ethernet interfaces on first boot so
          # cloud-init can reach tootles to fetch user-data. User-data itself
          # can later override with a static config.
          - name: "configure-network-dhcp"
            image: ghcr.io/jasonyates/tinkerbell-actions/writefile:latest
            timeout: 60
            environment:
              DEST_DISK: "/dev/md0"
              FS_TYPE: "ext4"
              DEST_PATH: "/etc/netplan/50-tinkerbell-dhcp.yaml"
              UID: "0"
              GID: "0"
              MODE: "0600"
              DIRMODE: "0755"
              CONTENTS: |
                network:
                  version: 2
                  ethernets:
                    all-en:
                      match:
                        name: "en*"
                      dhcp4: true
                      dhcp6: false
                      optional: true
                    all-eth:
                      match:
                        name: "eth*"
                      dhcp4: true
                      dhcp6: false
                      optional: true

          # 5. Wire cloud-init to this stack's tootles as an EC2 datasource.
          - name: "configure-cloud-init"
            image: ghcr.io/jasonyates/tinkerbell-actions/writefile:latest
            timeout: 60
            environment:
              DEST_DISK: "/dev/md0"
              FS_TYPE: "ext4"
              DEST_PATH: "/etc/cloud/cloud.cfg.d/90-tinkerbell.cfg"
              UID: "0"
              GID: "0"
              MODE: "0644"
              DIRMODE: "0755"
              CONTENTS: |
                datasource_list: [ Ec2, NoCloud, None ]
                datasource:
                  Ec2:
                    metadata_urls: [ "http://31.24.228.5:7080" ]
                    strict_id: false
                    metadata_version: 2009-04-04

          # 5. Set root password + enable root SSH (bootstrap credential).
          - name: "set-root-password"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 120
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "sed -i 's/^#*PermitRootLogin.*$/PermitRootLogin yes/g' /etc/ssh/sshd_config; echo root:password | chpasswd; passwd -u root"

          # 5. Write mdadm.conf so initramfs can assemble /dev/md0 at boot.
          - name: "configure-mdadm"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 120
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "mkdir -p /etc/mdadm; mdadm --detail --scan > /etc/mdadm/mdadm.conf"

          # 6. Write /etc/fstab.
          - name: "configure-fstab"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 60
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "printf 'LABEL=ROOT / ext4 defaults 0 1\n' > /etc/fstab"

          # 7. Regenerate initramfs so it includes mdadm + the mdadm.conf above.
          - name: "update-initramfs"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 300
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "update-initramfs -u -k all"

          # 8. Install GRUB MBR on sda.
          - name: "grub-install-sda"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 300
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "grub-install --target=i386-pc /dev/sda"

          # 9. Install GRUB MBR on sdb (mirror).
          - name: "grub-install-sdb"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 300
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "grub-install --target=i386-pc /dev/sdb"

          # 10. Generate grub.cfg referencing /dev/md0's UUID.
          - name: "update-grub"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 300
            environment:
              BLOCK_DEVICE: "/dev/md0"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "update-grub"

          # 11. Reboot into the installed OS. waitdaemon defers the reboot so
          # tink-agent can report this action's success before the host drops.
          - name: "reboot"
            image: docker.repo.thghosting.cloud/dca/waitdaemon:v0.1.1
            timeout: 90
            pid: host
            command: ["reboot"]
            environment:
              IMAGE: docker.repo.thghosting.cloud/dca/alpine:latest
              WAIT_SECONDS: 10
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
