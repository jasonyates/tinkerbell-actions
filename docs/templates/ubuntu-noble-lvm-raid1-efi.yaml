apiVersion: tinkerbell.org/v1alpha1
kind: Template
metadata:
  name: ubuntu-noble-lvm-raid1-efi
  namespace: tink-system
  labels:
    os: ubuntu
    pretty-name: ubuntu-noble-lvm-raid1-efi
spec:
  data: |
    version: "0.1"
    name: ubuntu-noble-lvm-raid1-efi
    global_timeout: 432000
    tasks:
      - name: "os-installation"
        worker: "{{ .device_1 }}"
        volumes:
          - /dev:/dev
          - /dev/console:/dev/console
          - /lib/firmware:/lib/firmware:ro
          - /sys:/sys
        actions:
          # 1. Partition (ESP + LINUX on each disk), assemble /dev/md0 over LINUX,
          # then create vg0 on /dev/md0 with logical volumes root/var/home/docker.
          - name: "rootio-partition"
            image: ghcr.io/jasonyates/tinkerbell-actions/rootio:latest
            timeout: 180
            command: ["partition"]
            environment:
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 2. mkfs: ext4 on each LV, FAT32 on each ESP.
          - name: "rootio-format"
            image: ghcr.io/jasonyates/tinkerbell-actions/rootio:latest
            timeout: 180
            command: ["format"]
            environment:
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 3. Extract the EFI-flavoured Noble rootfs onto /dev/vg0/root.
          - name: "extract-rootfs"
            image: ghcr.io/jasonyates/tinkerbell-actions/archive2disk:latest
            timeout: 900
            environment:
              ARCHIVE_URL: "http://31.24.228.5:7173/noble-rootfs-efi.tar.gz"
              ARCHIVE_TYPE: "targz"
              DEST_DISK: "/dev/vg0/root"
              FS_TYPE: "ext4"
              DEST_PATH: "/"
              INSECURE_NO_TARFILE_CHECKSUM_VERIFICATION: "true"

          # 4. Default netplan: DHCP all ethernet interfaces on first boot so
          # cloud-init can reach tootles to fetch user-data. User-data itself
          # can rewrite this netplan with static config via write_files +
          # `netplan apply` (or by emitting a file at higher priority).
          - name: "configure-network-dhcp"
            image: ghcr.io/jasonyates/tinkerbell-actions/writefile:latest
            timeout: 60
            environment:
              DEST_DISK: "/dev/vg0/root"
              FS_TYPE: "ext4"
              DEST_PATH: "/etc/netplan/50-tinkerbell-dhcp.yaml"
              UID: "0"
              GID: "0"
              MODE: "0600"
              DIRMODE: "0755"
              CONTENTS: |
                network:
                  version: 2
                  ethernets:
                    all-en:
                      match:
                        name: "en*"
                      dhcp4: true
                      dhcp6: false
                      optional: true
                    all-eth:
                      match:
                        name: "eth*"
                      dhcp4: true
                      dhcp6: false
                      optional: true

          # 5. Wire cloud-init to this stack's tootles as an EC2 datasource.
          # Tootles serves /2009-04-04/user-data and meta-data/* by the caller's
          # IP; cloud-init's DataSourceEc2 consumes exactly that shape.
          # Per-stack config (tootles URL) lives here, not in the rootfs image.
          - name: "configure-cloud-init"
            image: ghcr.io/jasonyates/tinkerbell-actions/writefile:latest
            timeout: 60
            environment:
              DEST_DISK: "/dev/vg0/root"
              FS_TYPE: "ext4"
              DEST_PATH: "/etc/cloud/cloud.cfg.d/90-tinkerbell.cfg"
              UID: "0"
              GID: "0"
              MODE: "0644"
              DIRMODE: "0755"
              CONTENTS: |
                datasource_list: [ Ec2, NoCloud, None ]
                datasource:
                  Ec2:
                    metadata_urls: [ "http://31.24.228.5:7080" ]
                    strict_id: false
                    metadata_version: 2009-04-04

          # 6. Apply root password, SSH keys, users[], and sshd{} settings from
          # Hegel metadata. Legacy root fields (crypted_root_password, ssh_keys)
          # still work; users[]/sshd{} are additive.
          - name: "user-manage"
            image: ghcr.io/jasonyates/tinkerbell-actions/user-manage:latest
            timeout: 120
            environment:
              BLOCK_DEVICE: "/dev/vg0/root"
              FS_TYPE: "ext4"
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 7. Write mdadm.conf so the initramfs can assemble /dev/md0 at boot
          # (the lvm2 initramfs hook scans PVs and activates vg0 on top of it).
          - name: "configure-mdadm"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 120
            environment:
              BLOCK_DEVICE: "/dev/vg0/root"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "mkdir -p /etc/mdadm; mdadm --detail --scan > /etc/mdadm/mdadm.conf"

          # 8. Generate /etc/fstab from storage.filesystems labels in metadata.
          - name: "rootio-fstab"
            image: ghcr.io/jasonyates/tinkerbell-actions/rootio:latest
            timeout: 60
            command: ["fstab"]
            environment:
              BLOCK_DEVICE: "/dev/vg0/root"
              FS_TYPE: "ext4"
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 9. Preload the lvm + mdraid1x GRUB modules so root-on-LVM-on-RAID
          # boots even if grub-install's auto-detection misses one of them.
          # Defensive stopgap — grub2disk EFI mode writes a working grub config
          # either way, but keeping this preload is cheap insurance.
          - name: "configure-grub-lvm"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 60
            environment:
              BLOCK_DEVICE: "/dev/vg0/root"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "echo 'GRUB_PRELOAD_MODULES=\"lvm mdraid1x\"' >> /etc/default/grub"

          # 10. Apply serial console (tty + baud) from metadata. No-op when
          # metadata has no console{} block.
          - name: "serial-console"
            image: ghcr.io/jasonyates/tinkerbell-actions/serial-console:latest
            timeout: 60
            environment:
              BLOCK_DEVICE: "/dev/vg0/root"
              FS_TYPE: "ext4"
              METADATA_SERVICE_PORT: "7080"
              MIRROR_HOST: "31.24.228.5"

          # 11. Regenerate initramfs so it includes mdadm + lvm2 hooks and the
          # mdadm.conf written above.
          - name: "update-initramfs"
            image: ghcr.io/jasonyates/tinkerbell-actions/cexec:latest
            timeout: 300
            environment:
              BLOCK_DEVICE: "/dev/vg0/root"
              FS_TYPE: "ext4"
              CHROOT: "y"
              DEFAULT_INTERPRETER: "/bin/bash -eux -c"
              CMD_LINE: "update-initramfs -u -k all"

          # 12. Install GRUB to sda's ESP. grub2disk MODE=efi handles install,
          # firmware fallback copy, and best-effort NVRAM registration.
          - name: "grub-install-sda"
            image: ghcr.io/jasonyates/tinkerbell-actions/grub2disk:latest
            timeout: 300
            environment:
              GRUB_INSTALL_PATH: "/dev/vg0/root"
              FS_TYPE: "ext4"
              MODE: "efi"
              EFI_PARTITION: "/dev/sda1"
              BOOTLOADER_ID: "ubuntu"

          # 13. Install GRUB to sdb's ESP (backup bootloader, mirrors step 12).
          - name: "grub-install-sdb"
            image: ghcr.io/jasonyates/tinkerbell-actions/grub2disk:latest
            timeout: 300
            environment:
              GRUB_INSTALL_PATH: "/dev/vg0/root"
              FS_TYPE: "ext4"
              MODE: "efi"
              EFI_PARTITION: "/dev/sdb1"
              BOOTLOADER_ID: "ubuntu-backup"

          # 14. Reboot the host into the installed OS. waitdaemon defers the
          # reboot so tink-agent can report this action's success before the
          # host drops — otherwise the workflow would be stuck in "running".
          - name: "reboot"
            image: docker.repo.thghosting.cloud/dca/waitdaemon:v0.1.1
            timeout: 90
            pid: host
            command: ["reboot"]
            environment:
              IMAGE: docker.repo.thghosting.cloud/dca/alpine:latest
              WAIT_SECONDS: 10
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
